pre-commit:
  parallel: false
  commands:
    unit-tests:
      name: Unit tests
      run: pnpm test --run

    trunk:
      name: Trunk check (lint + format + security)
      # --fix auto-corrects what it can; exits 1 if unfixable violations remain
      run: trunk check --fix

    dep-cruiser:
      name: Dependency boundary check
      # server/ not yet created — add once first server route is written
      run: pnpm dependency-cruiser core composables pages --config .dependency-cruiser.cjs --ts-config .nuxt/tsconfig.json
