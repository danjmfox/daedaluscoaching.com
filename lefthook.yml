pre-commit:
  parallel: false
  commands:
    unit-tests:
      name: Unit tests
      run: pnpm test --run

    eslint:
      name: ESLint (security + Vue rules)
      run: pnpm lint

    dep-cruiser:
      name: Dependency boundary check
      # server/ not yet created — added when first server route is written
      run: pnpm dependency-cruiser core composables pages --config .dependency-cruiser.cjs --ts-config .nuxt/tsconfig.json

    # stylelint: enabled in Sprint 1 once .stylelintrc.cjs and tokens.css exist
