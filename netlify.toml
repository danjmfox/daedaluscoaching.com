[build]
command = "pnpm run generate"
publish = "dist"

[build.environment]
NODE_VERSION = "22"

# Proxy Swoopy (separate Netlify site) as same-origin.
# status 200 = proxy (not a redirect) — browser sees /swoopy/* as same-origin,
# which means the SwoopyEmbed.vue <iframe> needs no frame-src CSP exception.
[[redirects]]
from = "/swoopy/*"
to = "https://swoopy.netlify.app/:splat"
status = 200
force = true

# Serve custom 404 page for any unmatched path.
# Nuxt SSG generates 200.html as the SPA fallback; Netlify serves it with 404 status.
[[redirects]]
from = "/*"
to = "/200.html"
status = 404
