<svg xmlns="http://www.w3.org/2000/svg" width="440" height="440" viewBox="0 0 440 440">
  <rect width="440" height="440" fill="#fffef4"/>

  <!-- ── Layer 1a: maze walls ──────────────────────────────────────────── -->
  <g stroke="#8ecfd6" stroke-width="16" stroke-linecap="square" fill="none">

    <!-- outer boundary (entrance gap top-left, C void gap on right) -->
    <line x1="60"  y1="20"  x2="420" y2="20"/>   <!-- top, skipping entrance x=20..60 -->
    <line x1="20"  y1="420" x2="420" y2="420"/>   <!-- bottom -->
    <line x1="20"  y1="20"  x2="20"  y2="420"/>   <!-- left -->
    <line x1="420" y1="20"  x2="420" y2="140"/>   <!-- right, rows 0-2 -->
    <line x1="420" y1="300" x2="420" y2="420"/>   <!-- right, rows 7-9 -->

    <!-- ── horizontal internal walls ── -->

    <!-- y=60  absent: c=0,2,4,7,8 -->
    <line x1="60"  y1="60"  x2="100" y2="60"/>
    <line x1="140" y1="60"  x2="180" y2="60"/>
    <line x1="220" y1="60"  x2="300" y2="60"/>
    <line x1="380" y1="60"  x2="420" y2="60"/>

    <!-- y=100  absent: c=0,2,5,6,7,8 -->
    <line x1="60"  y1="100" x2="100" y2="100"/>
    <line x1="140" y1="100" x2="220" y2="100"/>
    <line x1="380" y1="100" x2="420" y2="100"/>

    <!-- y=140  absent: c=0,3,4,6  + void top at c=8,9 merged into right segment -->
    <line x1="60"  y1="140" x2="140" y2="140"/>
    <line x1="220" y1="140" x2="260" y2="140"/>
    <line x1="300" y1="140" x2="420" y2="140"/>

    <!-- y=180  absent: c=0,1,5,6 -->
    <line x1="100" y1="180" x2="220" y2="180"/>
    <line x1="300" y1="180" x2="340" y2="180"/>

    <!-- y=220  absent: c=0,2 -->
    <line x1="60"  y1="220" x2="100" y2="220"/>
    <line x1="140" y1="220" x2="340" y2="220"/>

    <!-- y=260  absent: c=0,3 -->
    <line x1="60"  y1="260" x2="140" y2="260"/>
    <line x1="180" y1="260" x2="340" y2="260"/>

    <!-- y=300  absent: c=0,1,4,6  + void bottom at c=8,9 in right segment -->
    <line x1="100" y1="300" x2="180" y2="300"/>
    <line x1="220" y1="300" x2="260" y2="300"/>
    <line x1="300" y1="300" x2="420" y2="300"/>

    <!-- y=340  absent: c=0,3,5,7 -->
    <line x1="60"  y1="340" x2="140" y2="340"/>
    <line x1="180" y1="340" x2="220" y2="340"/>
    <line x1="260" y1="340" x2="300" y2="340"/>
    <line x1="340" y1="340" x2="420" y2="340"/>

    <!-- y=380  absent: c=0,1,2,4,6,8 -->
    <line x1="140" y1="380" x2="180" y2="380"/>
    <line x1="220" y1="380" x2="260" y2="380"/>
    <line x1="300" y1="380" x2="340" y2="380"/>
    <line x1="380" y1="380" x2="420" y2="380"/>

    <!-- ── vertical internal walls ── -->

    <!-- x=60  absent: r=2,3,5,7,9 -->
    <line x1="60" y1="20"  x2="60" y2="100"/>
    <line x1="60" y1="180" x2="60" y2="220"/>
    <line x1="60" y1="260" x2="60" y2="300"/>
    <line x1="60" y1="340" x2="60" y2="380"/>

    <!-- x=100  absent: r=0,2,4,6,9 -->
    <line x1="100" y1="60"  x2="100" y2="100"/>
    <line x1="100" y1="140" x2="100" y2="180"/>
    <line x1="100" y1="220" x2="100" y2="260"/>
    <line x1="100" y1="300" x2="100" y2="380"/>

    <!-- x=140  absent: r=0,3,7,8 -->
    <line x1="140" y1="60"  x2="140" y2="140"/>
    <line x1="140" y1="180" x2="140" y2="300"/>
    <line x1="140" y1="380" x2="140" y2="420"/>

    <!-- x=180  absent: r=0,3,4,8 -->
    <line x1="180" y1="60"  x2="180" y2="140"/>
    <line x1="180" y1="220" x2="180" y2="340"/>
    <line x1="180" y1="380" x2="180" y2="420"/>

    <!-- x=220  D-C boundary  absent: r=1,7 -->
    <line x1="220" y1="20"  x2="220" y2="60"/>
    <line x1="220" y1="100" x2="220" y2="300"/>
    <line x1="220" y1="340" x2="220" y2="420"/>

    <!-- x=260  absent: r=0,1,3,6,8 -->
    <line x1="260" y1="100" x2="260" y2="140"/>
    <line x1="260" y1="180" x2="260" y2="260"/>
    <line x1="260" y1="300" x2="260" y2="340"/>
    <line x1="260" y1="380" x2="260" y2="420"/>

    <!-- x=300  absent: r=4,7,9 -->
    <line x1="300" y1="20"  x2="300" y2="180"/>
    <line x1="300" y1="220" x2="300" y2="300"/>
    <line x1="300" y1="340" x2="300" y2="380"/>

    <!-- x=340  inner-C boundary  absent: r=4 (exit gap), r=8 -->
    <line x1="340" y1="20"  x2="340" y2="180"/>
    <line x1="340" y1="220" x2="340" y2="340"/>
    <line x1="340" y1="380" x2="340" y2="420"/>

    <!-- x=380  absent: r=0,2,3,4,5,6,7,9 (C arm sparse) -->
    <line x1="380" y1="60"  x2="380" y2="100"/>
    <line x1="380" y1="340" x2="380" y2="380"/>

  </g>

  <!-- ── Layer 1b: coral solution thread ──────────────────────────────── -->
  <!--
    Entrance: top of (r0,c0) at (40,20)
    Path: down D-lobe, loop up through c2, across top to c4,
          cross D-C boundary at r1, down C-lobe col 6 to r4,
          exit right through gap into C void.
  -->
  <polyline
    points="40,20
            40,40   40,80   40,120
            80,120  120,120
            120,80  120,40
            160,40  200,40
            200,80
            240,80  280,80
            280,120 280,160 280,200
            320,200 370,200"
    fill="none" stroke="#ff795a" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Layer 2: original wings + arc, scaled to canvas ──────────────── -->
  <g transform="translate(0,73.3) scale(0.2865)" opacity="0.82">

